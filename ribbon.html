<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>Live Score Ribbon — OBS Overlay</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: transparent !important;
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Rajdhani', sans-serif;
  }
  :root{--accent:#00d4ff;--gold:#ffd700;--green:#00e676;--red:#ff1744;--four:#00bfff;--six:#ff6600;--muted:#7899cc;--panel2:#111e34;}

  /* Entry screen (only shown briefly if ?id= is missing, so you know to fix the OBS URL) */
  #entry{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#04070d;color:#fff;font-family:'Rajdhani',sans-serif;text-align:center;padding:20px;}
  #entry.hide{display:none;}

  #ribbon-dock{position:fixed;left:0;right:0;bottom:0;display:none;}
  #ribbon-dock.show{display:block;}

  .ribbon-main{
    background:linear-gradient(90deg,#00060e 0%,#030f22 40%,#030f22 60%,#00060e 100%);
    border-top:2.5px solid var(--accent);
    display:grid;grid-template-columns:auto 1fr auto;align-items:stretch;
    height:64px;overflow:hidden;
    box-shadow:0 -6px 40px rgba(0,212,255,.22),inset 0 1px 0 rgba(0,212,255,.08);
    position:relative;
  }
  .rt{display:flex;align-items:center;gap:8px;padding:0 16px;min-width:170px;}
  .rt.right{flex-direction:row-reverse;}
  .rtlogo{width:38px;height:38px;border-radius:50%;background:var(--panel2);border:2px solid rgba(0,212,255,.3);display:flex;align-items:center;justify-content:center;font-size:17px;overflow:hidden;flex-shrink:0;}
  .rtlogo img{width:100%;height:100%;object-fit:contain;}
  .rtname{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
  .rtscore{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;line-height:1;}
  .rt.batting .rtscore{color:#fff;}
  .rt.bowling .rtscore{color:var(--muted);font-size:21px;}
  .rt.batting .rtname{color:var(--accent);}
  .rc-rib{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:0 12px;border-left:1px solid rgba(0,212,255,.12);border-right:1px solid rgba(0,212,255,.12);min-width:240px;}
  .rc-bats{display:flex;gap:16px;}
  .rc-bat{display:flex;align-items:center;gap:5px;}
  .rc-bn{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:#fff;white-space:nowrap;}
  .rc-bs{font-family:'Orbitron',sans-serif;font-size:10px;color:var(--gold);}
  .sm{color:var(--green);font-size:9px;}
  .rc-bwl{display:flex;gap:6px;align-items:center;}
  .rc-bwln{font-family:'Rajdhani',sans-serif;font-size:11px;color:#7899cc;white-space:nowrap;}
  .rc-bwls{font-family:'Orbitron',sans-serif;font-size:9px;color:var(--muted);}
  .rc-ob{display:flex;gap:3px;}
  .rb{width:19px;height:19px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:7px;font-weight:700;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.06);color:rgba(255,255,255,.4);}
  .rb.r4{border-color:var(--four);color:var(--four);background:rgba(0,191,255,.15);}
  .rb.r6{border-color:var(--six);color:var(--six);background:rgba(255,102,0,.15);}
  .rb.rW{border-color:var(--red);color:var(--red);background:rgba(255,23,68,.15);}
  .rb.empty{opacity:.18;}
  .rc-ri{display:flex;flex-direction:column;align-items:center;}
  .rc-crrl{font-size:8px;color:var(--muted);letter-spacing:2px;}
  .rc-crrv{font-family:'Orbitron',sans-serif;font-size:14px;color:var(--gold);font-weight:700;}
  .rib-tgt{background:linear-gradient(90deg,#190900,#2a1000);border-top:1px solid rgba(255,102,0,.5);padding:4px 14px;display:flex;justify-content:center;gap:20px;font-size:10px;}
  .rtgt-i{display:flex;gap:5px;align-items:center;}
  .rtgt-l{color:rgba(255,153,80,.7);letter-spacing:1px;text-transform:uppercase;}
  .rtgt-v{font-family:'Orbitron',sans-serif;color:var(--six);font-weight:700;}
</style>
</head>
<body>

<div id="entry">
  <div>
    <div style="font-size:20px;font-weight:700;margin-bottom:10px;">⚠️ Match ID লিংকে দেওয়া নেই</div>
    <div style="font-size:14px;color:#9ab;">OBS Browser Source URL-এর শেষে <code>?id=আপনারMatchID</code> যোগ করুন।<br>যেমন: <code>ribbon.html?id=ABC123</code></div>
  </div>
</div>

<div id="ribbon-dock">
  <div class="ribbon-main">
    <div class="rt batting"><div class="rtlogo" id="rb-bat-logo">🏏</div><div><div class="rtname" id="rb-bat-name">TEAM A</div><div class="rtscore batting" id="rb-bat-sc">0/0</div><div style="font-size:9px;color:var(--muted);" id="rb-bat-ov">0.0 ov</div></div></div>
    <div class="rc-rib">
      <div class="rc-bats">
        <div class="rc-bat"><span class="sm">●</span><span class="rc-bn" id="rb-s-n">–</span><span class="rc-bs" id="rb-s-s">0(0)</span></div>
        <div class="rc-bat"><span class="rc-bn" id="rb-ns-n">–</span><span class="rc-bs" id="rb-ns-s">0(0)</span></div>
      </div>
      <div class="rc-bwl"><span class="rc-bwln" id="rb-bwl-n">–</span><span class="rc-bwls" id="rb-bwl-s">0-0-0</span><div class="rc-ob" id="rb-ob"></div></div>
    </div>
    <div class="rt right bowling"><div class="rtlogo" id="rb-bowl-logo">🏏</div><div style="text-align:right;"><div class="rtname" id="rb-bowl-name">TEAM B</div><div class="rtscore bowling" id="rb-bowl-sc">–</div><div class="rc-ri"><div class="rc-crrl">CRR</div><div class="rc-crrv" id="rb-crr">0.00</div></div></div></div>
  </div>
  <div class="rib-tgt" id="rb-tgt-strip" style="display:none;">
    <div class="rtgt-i"><span class="rtgt-l">Target</span><span class="rtgt-v" id="rb-tgt">–</span></div>
    <div class="rtgt-i"><span class="rtgt-l">Need</span><span class="rtgt-v" id="rb-need">–</span></div>
    <div class="rtgt-i"><span class="rtgt-l">RRR</span><span class="rtgt-v" id="rb-rrr">–</span></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyBnJK9-ySZIC_AJvKWR0qym7Kh36z6VUSo",
  authDomain: "cricket-scorer-pro-37f01.firebaseapp.com",
  projectId: "cricket-scorer-pro-37f01",
  storageBucket: "cricket-scorer-pro-37f01.firebasestorage.app",
  messagingSenderId: "103065036677",
  appId: "1:103065036677:web:85ee364f8c8e20a1e5c6ec"
};
let db = null;

function fillBalls(containerId, balls){
  const c = document.getElementById(containerId);
  if(!c) return;
  c.innerHTML = '';
  for(let k=0; k<6; k++){
    const dv = document.createElement('div');
    const b = balls[k];
    if(b === undefined){ dv.className = 'rb empty'; dv.textContent = '·'; }
    else if(b === 'W'){ dv.className = 'rb rW'; dv.textContent = 'W'; }
    else if(b === '4'){ dv.className = 'rb r4'; dv.textContent = '4'; }
    else if(b === '6'){ dv.className = 'rb r6'; dv.textContent = '6'; }
    else { dv.className = 'rb'; dv.textContent = b; }
    c.appendChild(dv);
  }
}

function getCRR(i){
  const overs = (i.overs || 0) + (i.gb || 0) / 6;
  if(overs <= 0) return '0.00';
  return (i.runs / overs).toFixed(2);
}

function render(data){
  if(!data || !data.innings) return;
  const ci = data.ci;
  const i = data.innings[ci];
  if(!i) return;

  document.getElementById('entry').classList.add('hide');
  document.getElementById('ribbon-dock').classList.add('show');

  const battingIdx = (i.bt !== undefined && i.bt !== null) ? i.bt : (data.bt !== undefined ? data.bt : ci);
  const bowlingIdx = battingIdx === 0 ? 1 : 0;
  const bt = data.teams[battingIdx] || {name:'Team A'};
  const blt = data.teams[bowlingIdx] || {name:'Team B'};

  document.getElementById('rb-bat-logo').innerHTML = bt.logo ? '<img src="'+bt.logo+'">' : (bt.emoji || '🏏');
  document.getElementById('rb-bowl-logo').innerHTML = blt.logo ? '<img src="'+blt.logo+'">' : (blt.emoji || '🏏');
  document.getElementById('rb-bat-name').textContent = bt.name;
  document.getElementById('rb-bat-sc').textContent = i.runs + '/' + i.wkts;
  document.getElementById('rb-bat-ov').textContent = i.overs + '.' + (i.gb||0) + ' ov';
  document.getElementById('rb-bowl-name').textContent = blt.name;
  document.getElementById('rb-crr').textContent = getCRR(i);

  const s = (i.str !== null && i.str !== undefined && i.bat) ? i.bat[i.str] : null;
  const ns = (i.ns !== null && i.ns !== undefined && i.bat) ? i.bat[i.ns] : null;
  const bw = (i.bi !== null && i.bi !== undefined && i.bwl) ? i.bwl[i.bi] : null;
  document.getElementById('rb-s-n').textContent = s ? s.name + '*' : '–';
  document.getElementById('rb-s-s').textContent = s ? s.r + '(' + s.b + ')' : '';
  document.getElementById('rb-ns-n').textContent = ns ? ns.name : '–';
  document.getElementById('rb-ns-s').textContent = ns ? ns.r + '(' + ns.b + ')' : '';
  document.getElementById('rb-bwl-n').textContent = bw ? bw.name : '–';
  document.getElementById('rb-bwl-s').textContent = bw ? bw.o + '-' + bw.w + '-' + bw.r : '';

  fillBalls('rb-ob', i.co || []);

  if(ci === 1 && data.innings[0]){
    const i1 = data.innings[0];
    const tgt = i1.runs + 1;
    const need = tgt - i.runs;
    const rem = (data.maxOvers*6) - (i.overs*6 + (i.gb||0));
    document.getElementById('rb-tgt-strip').style.display = 'flex';
    document.getElementById('rb-tgt').textContent = tgt;
    document.getElementById('rb-need').textContent = Math.max(need,0) + '(' + Math.max(rem,0) + 'b)';
    document.getElementById('rb-rrr').textContent = rem > 0 ? ((Math.max(need,0)/rem)*6).toFixed(2) : '0.00';
    document.getElementById('rb-bowl-sc').textContent = i1.runs + '/' + i1.wkts;
  } else {
    document.getElementById('rb-tgt-strip').style.display = 'none';
    document.getElementById('rb-bowl-sc').textContent = '–';
  }
}

window.addEventListener('load', () => {
  try {
    if(typeof firebase !== 'undefined'){
      if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
      db = firebase.firestore();
    }
  } catch(e) { console.error('Firebase init error:', e); }

  const params = new URLSearchParams(window.location.search);
  const id = (params.get('id') || '').trim().toUpperCase();
  if(!id || !db) return; // entry screen stays visible

  db.collection('liveDisplays').doc(id).onSnapshot(doc => {
    if(doc.exists) render(doc.data());
  }, err => console.error('Ribbon sync error:', err));
});
</script>
</body>
</html>
